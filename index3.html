<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Debugging My Heart.exe</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap'); /* fonte de terminal */

    body {
      margin: 0;
      height: 100vh;
      background: #0d0d0d;
      color: #00ff9d;
      font-family: 'VT323', monospace;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .terminal {
      width: 92%;
      max-width: 620px;
      background: rgba(0, 0, 0, 0.95);
      border: 3px solid #00ff9d;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 0 40px rgba(0, 255, 157, 0.4);
      height: 85vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      text-align: center;
      margin-bottom: 15px;
      font-size: 1.8rem;
      color: #ff1493;
      text-shadow: 0 0 10px #ff1493;
    }

    .log {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      background: #000;
      border: 1px solid #00ff9d;
      margin-bottom: 15px;
      line-height: 1.5;
      font-size: 1.35rem;
    }

    .line {
      margin-bottom: 8px;
      animation: typing 0.8s steps(40, end) forwards;
      overflow: hidden;
      white-space: nowrap;
    }

    .input-area {
      display: flex;
      align-items: center;
      font-size: 1.4rem;
    }

    .prompt {
      color: #00ff9d;
      margin-right: 8px;
    }

    input {
      background: transparent;
      border: none;
      color: #00ff9d;
      font-family: inherit;
      font-size: inherit;
      flex: 1;
      outline: none;
    }

    .btn {
      margin-top: 15px;
      padding: 14px 30px;
      background: #ff1493;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 1.4rem;
      cursor: pointer;
      width: 100%;
      transition: all 0.3s;
    }

    .btn:hover {
      background: #ff69b4;
      transform: scale(1.03);
    }

    .heart {
      color: #ff1493;
      animation: beat 1.2s infinite;
    }

    @keyframes typing {
      from { width: 0 }
      to { width: 100% }
    }

    @keyframes beat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.3); }
    }
  </style>
</head>
<body>

  <div class="terminal">
    <div class="header">DEBUGGING MY HEART v1.0 ❤️</div>
    
    <div class="log" id="log">
      <div class="line">> Iniciando sistema de compatibilidade emocional...</div>
      <div class="line">> Usuário detectado: [nome dela]</div>
      <div class="line">> Bug encontrado: Pedro está apaixonado demais</div>
      <div class="line">> Sintoma: Saudade nível crítico</div>
    </div>

    <div class="input-area">
      <span class="prompt">></span>
      <input type="text" id="command" placeholder="Digite um comando (ex: debug, love, fix)" onkeypress="if(event.key === 'Enter') runCommand()">
    </div>

    <button class="btn" onclick="runCommand()">EXECUTAR COMANDO</button>
  </div>

  <script>
    const log = document.getElementById('log');
    const input = document.getElementById('command');

    function addLine(text, color = '#00ff9d') {
      const line = document.createElement('div');
      line.className = 'line';
      line.style.color = color;
      line.textContent = '> ' + text;
      log.appendChild(line);
      log.scrollTop = log.scrollHeight;
    }

    function runCommand() {
      const cmd = input.value.trim().toLowerCase();
      if (!cmd) return;

      addLine(cmd, '#ff1493');

      if (cmd.includes('debug') || cmd.includes('fix')) {
        addLine("Depurando coração... 50%");
        setTimeout(() => addLine("Removendo medo de se apaixonar..."), 800);
        setTimeout(() => addLine("Bug 'medo' corrigido com sucesso!"), 1600);
      } 
      else if (cmd.includes('love') || cmd.includes('apaixonado')) {
        addLine("ERROR: Overflow de sentimentos detectado 💖", '#ff1493');
        addLine("Pedro não consegue mais esconder...");
      } 
      else if (cmd === 'sair' || cmd === 'exit') {
        addLine("Comando inválido. Você não pode sair desse sistema tão fácil 😏");
      } 
      else {
        addLine("Comando não reconhecido... Tente: debug, love ou fix");
      }

      // Depois de algumas interações, mostra a mensagem final
      if (log.children.length > 12) {
        setTimeout(() => {
          addLine("--- SISTEMA FINALIZADO ---", '#ff1493');
          addLine("Conclusão: Eu te quero pra mim.", '#ff69b4');
          addLine("Quer rodar esse programa na vida real? Me chama ❤️", '#ff69b4');
          
          // Botão final grande
          const finalBtn = document.createElement('button');
          finalBtn.className = 'btn';
          finalBtn.textContent = 'SIM, VAMOS RODAR JUNTO ❤️';
          finalBtn.onclick = () => alert("Então vem cá logo que esse dev tá com saudade pra caralho 😍");
          log.parentNode.appendChild(finalBtn);
        }, 1200);
      }

      input.value = '';
    }

    // Inicia com mais logs automáticos
    setTimeout(() => addLine("Variável 'saudadeDeVoce' = infinito"), 600);
    setTimeout(() => addLine("Função beijo() chamada 999+ vezes"), 1400);
  </script>
</body>
</html>
